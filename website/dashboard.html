<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Safe Roads Chennai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            width: 260px;
            background: var(--white);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #E8EAF6;
            color: var(--primary-blue);
        }

        .stat-card {
            background: var(--white);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-soft);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .bg-blue-light {
            background: #E8EAF6;
            color: var(--primary-blue);
        }

        .bg-red-light {
            background: #FFEBEE;
            color: var(--accent-red);
        }

        .bg-green-light {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #FFF3E0;
            color: #EF6C00;
        }

        .badge-processing, .badge-in-progress {
            background: #E3F2FD;
            color: #1976D2;
        }

        .badge-resolved {
            background: #E8F5E9;
            color: #2E7D32;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem;">
            <img src="assets/logo.png" alt="Logo" style="height: 40px;">
            <h2 style="color: var(--primary-blue); font-size: 1.2rem;">SRC Portal</h2>
        </div>

        <nav id="dynamicNav">
            <!-- Sidebar links will be injected by app.js -->
        </nav>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 style="font-size: 1.8rem;">Welcome back, <span id="welcomeName">User</span>!</h2>
                <p style="color: var(--text-muted);">Here's what's happening on your streets today.</p>
            </div>
            <div id="roleTag" class="badge" style="font-size: 0.9rem; padding: 8px 16px;"> CITIZEN </div>
        </header>

        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 2.5rem;">
            <div class="stat-card">
                <div class="stat-icon bg-blue-light"><i class="fas fa-clipboard-list"></i></div>
                <div>
                    <h3 id="statTotal">0</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Total Reports</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-red-light"><i class="fas fa-exclamation-triangle"></i></div>
                <div>
                    <h3 id="statPending">0</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Pending Review</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-blue-light"><i class="fas fa-spinner fa-spin"></i></div>
                <div>
                    <h3 id="statProcessing">0</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">In Progress</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-green-light"><i class="fas fa-check-circle"></i></div>
                <div>
                    <h3 id="statResolved">0</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Resolved</p>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
            <div>
                <h3 style="margin-bottom: 1.5rem;">Recent Complaints</h3>
                <div id="complaintsList">
                    <!-- Loaded via app.js -->
                    <div class="text-center p-4">Loading reports...</div>
                </div>
            </div>
            <div>
                <h3 style="margin-bottom: 1.5rem;">Priority Alerts</h3>
                <div class="card" style="padding: 1rem;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No urgent alerts in your zone today.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Safe Roads Chennai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <h1>Password Recovery</h1>
        <p>Enter your email to receive an OTP.</p>
    </div>

    <div class="premium-container animate-fade-in">
        <div class="card glass" style="max-width: 450px; margin: -40px auto 0;">
            <div id="step1">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Reset Password</h2>
                <div class="input-group">
                    <label>Registered Email</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email">
                </div>
                <button class="btn btn-primary" id="btnSendOtp" style="width: 100%;">Send OTP</button>
            </div>

            <div id="step2" style="display: none;">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Verify OTP</h2>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                    Enter the 4-digit code sent to <br><b id="displayEmail"></b>
                </p>
                <div class="input-group">
                    <input type="text" id="otpCode" maxlength="4" placeholder="0000"
                        style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
                </div>
                <button class="btn btn-primary" id="btnVerifyOtp" style="width: 100%;">Verify OTP</button>
            </div>

            <div id="step3" style="display: none;">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">New Password</h2>
                <div class="input-group">
                    <label>Enter New Password</label>
                    <input type="password" id="newPassword" placeholder="Min 8 characters">
                </div>
                <button class="btn btn-primary" id="btnResetPassword" style="width: 100%;">Update Password</button>
            </div>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Remembered? <a href="login.html"
                    style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        let userEmail = "";

        // Send OTP
        document.getElementById('btnSendOtp').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            if (!email) return alert("Enter email");

            try {
                const btn = document.getElementById('btnSendOtp');
                btn.disabled = true;
                btn.textContent = "Sending...";

                await Api.post("send-otp/", { email });
                userEmail = email;
                document.getElementById('displayEmail').textContent = email;
                step1.style.display = 'none';
                step2.style.display = 'block';
            } catch (error) {
                alert(error.message);
                document.getElementById('btnSendOtp').disabled = false;
                document.getElementById('btnSendOtp').textContent = "Send OTP";
            }
        });

        // Verify OTP
        document.getElementById('btnVerifyOtp').addEventListener('click', async () => {
            const code = document.getElementById('otpCode').value;
            if (!code) return alert("Enter OTP");

            try {
                await Api.post("verify-otp/", { email: userEmail, code });
                step2.style.display = 'none';
                step3.style.display = 'block';
            } catch (error) {
                alert(error.message);
            }
        });

        // Reset Password
        document.getElementById('btnResetPassword').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            if (newPassword.length < 8) return alert("Password must be at least 8 characters");

            try {
                await Api.post("reset-password/", { email: userEmail, new_password: newPassword });
                alert("Password changed successfully!");
                window.location.href = "login.html";
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>

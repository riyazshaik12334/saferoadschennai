<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Roads Chennai - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <h1>Safe Roads Chennai</h1>
        <p>Ensure Safer Streets for Every Citizen</p>
    </div>

    <div class="premium-container animate-fade-in">
        <div class="card glass" style="max-width: 450px; margin: -40px auto 0;">
            <div class="tabs" id="loginTabs">
                <div class="tab active" data-role="CITIZEN">Citizen</div>
                <div class="tab" data-role="AUTHORITY">Authority</div>
                <div class="tab" data-role="SUPERVISOR">Supervisor</div>
            </div>

            <div id="loginForm">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Login</h2>

                <div class="input-group">
                    <label id="identifierLabel">Email Address</label>
                    <input type="text" id="identifier" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Enter password">
                        <i class="fas fa-eye" id="togglePassword"
                            style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; font-size: 0.9rem; color: var(--text-muted);">
                        <input type="checkbox" style="margin-right: 8px;"> Remember Me
                    </label>
                    <a href="forgot-password.html" id="forgotPasswordLink"
                        style="color: var(--primary-blue); text-decoration: none; font-size: 0.9rem; font-weight: 500;">Forgot
                        Password?</a>
                </div>

                <button class="btn btn-primary" id="btnLogin" style="width: 100%;">Login</button>

                <p id="registerLink"
                    style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                    Don't have an account? <a href="register.html"
                        style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Create Account</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Tab Switching Logic
        const tabs = document.querySelectorAll('.tab');
        const identifierLabel = document.getElementById('identifierLabel');
        const identifierInput = document.getElementById('identifier');
        const registerLink = document.getElementById('registerLink');
        const btnLogin = document.getElementById('btnLogin');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        let currentRole = 'CITIZEN';

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentRole = tab.dataset.role;

                if (currentRole === 'AUTHORITY') {
                    identifierLabel.textContent = 'Officer ID / Email';
                    identifierInput.placeholder = 'Enter Officer ID or Email';
                    registerLink.style.display = 'none';
                    btnLogin.textContent = 'Login as Authority';
                    forgotPasswordLink.href = 'support.html';
                } else if (currentRole === 'SUPERVISOR') {
                    identifierLabel.textContent = 'Supervisor ID / Email';
                    identifierInput.placeholder = 'Enter Supervisor ID or Email';
                    registerLink.style.display = 'none';
                    btnLogin.textContent = 'Login as Supervisor';
                    forgotPasswordLink.href = 'support.html';
                } else {
                    identifierLabel.textContent = 'Email Address';
                    identifierInput.placeholder = 'Enter your email';
                    registerLink.style.display = 'block';
                    btnLogin.textContent = 'Login';
                    forgotPasswordLink.href = 'forgot-password.html';
                }
            });
        });

        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports - Safe Roads Chennai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            width: 260px;
            background: var(--white);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #E8EAF6;
            color: var(--primary-blue);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            background: var(--white);
            padding: 1rem;
            border-radius: 15px;
            box-shadow: var(--shadow-soft);
        }

        .filter-bar select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #E1E8EE;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem;">
            <img src="assets/logo.png" alt="Logo" style="height: 40px;">
            <h2 style="color: var(--primary-blue); font-size: 1.2rem;">SRC Portal</h2>
        </div>
        <nav id="dynamicNav">
            <!-- Sidebar links will be injected by app.js -->
        </nav>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 style="font-size: 1.8rem;">My Submitted Reports</h2>
                <p style="color: var(--text-muted);">Track the status of the issues you've reported.</p>
            </div>
            <a href="report.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Report</a>
        </header>

        <div class="filter-bar">
            <span>Filter by:</span>
            <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
            </select>
            <select id="priorityFilter">
                <option value="">All Priorities</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Normal">Normal</option>
            </select>
        </div>

        <div id="myComplaintsList">
            <div class="text-center p-4">Loading your reports...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function initMyReports(user) {
            const listId = "myComplaintsList";
            const statusFilter = document.getElementById("statusFilter");
            const priorityFilter = document.getElementById("priorityFilter");

            const refresh = () => {
                const filter = {};
                if (statusFilter.value) filter.status = statusFilter.value;
                if (priorityFilter.value) filter.priority = priorityFilter.value;
                loadComplaints(user, listId, filter);
            };

            statusFilter.onchange = refresh;
            priorityFilter.onchange = refresh;

            refresh();
        }
    </script>
</body>

</html>

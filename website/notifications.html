<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Safe Roads Chennai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            width: 260px;
            background: var(--white);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #E8EAF6;
            color: var(--primary-blue);
        }

        .notification-item {
            display: flex;
            gap: 15px;
            padding: 1.2rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .notification-item.unread {
            background: #F5F7FF;
            border-left: 4px solid var(--primary-blue);
        }

        .noti-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #E8EAF6;
            color: var(--primary-blue);
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem;">
            <img src="assets/logo.png" alt="Logo" style="height: 40px;">
            <h2 style="color: var(--primary-blue); font-size: 1.2rem;">SRC Portal</h2>
        </div>
        <nav id="dynamicNav">
            <!-- Sidebar links will be injected by app.js -->
        </nav>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 style="font-size: 1.8rem;">Notifications</h2>
                <p style="color: var(--text-muted);">Stay updated on your reports and local safety alerts.</p>
            </div>
            <button class="btn btn-primary" style="background: #eee; color: #333;" onclick="markAllAsRead()">Mark all as
                read</button>
        </header>

        <div class="card" style="padding: 0; overflow: hidden;" id="notificationsList">
            <div class="text-center p-4">Checking for new updates...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function initNotifications(user) {
            const list = document.getElementById("notificationsList");
            try {
                const notifications = await Api.get("notifications/", {
                    type: user.role, 
                    email: user.role === 'CITIZEN' ? user.email : ''
                });
                list.innerHTML = "";

                if (notifications.length === 0) {
                    list.innerHTML = '<div class="text-center p-5"><i class="fas fa-bell-slash fa-2x" style="color:#ccc;"></i><p style="margin-top:10px; color:var(--text-muted);">No notifications yet.</p></div>';
                    return;
                }

                notifications.forEach(noti => {
                    const item = document.createElement("div");
                    item.className = `notification-item ${noti.is_read ? '' : 'unread'}`;
                    item.innerHTML = `
                        <div class="noti-icon"><i class="fas fa-info-circle"></i></div>
                        <div style="flex:1;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <h4 style="font-size:0.95rem;">${noti.title || "Status Update"}</h4>
                                <span style="font-size:0.75rem; color:var(--text-muted);">${new Date(noti.timestamp).toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                            <p style="font-size:0.85rem; color:var(--text-muted);">${noti.message}</p>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                list.innerHTML = '<div class="text-center p-4 text-danger">Failed to load notifications.</div>';
            }
        }

        async function markAllAsRead() {
            // API implementation placeholder
            alert("All notifications marked as read.");
            location.reload();
        }
    </script>
</body>

</html>

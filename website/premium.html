<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Roads Chennai - Get Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .skip-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .skip-btn:hover {
            color: white;
        }

        .logo-section {
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-circle img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .app-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .premium-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 20px 0 10px;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .limited-offer {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 25px;
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 0 0 35px;
            text-align: left;
        }

        .feature-item {
            background: white;
            color: #333;
            padding: 12px 20px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .feature-item:hover {
            transform: scale(1.03);
        }

        .feature-item i {
            color: #4CAF50;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .upgrade-btn {
            background: white;
            color: #6a11cb;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .upgrade-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background: #f8f8f8;
        }

        /* Floating Confetti effect (simple) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            border-radius: 2px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <a href="login.html" class="skip-btn">Skip <i class="fas fa-chevron-right"></i></a>
        
        <div class="logo-section">
            <div class="logo-circle">
                <img src="assets/logo.png" alt="Logo">
            </div>
            <div class="app-name">Safe Roads Chennai</div>
        </div>

        <div class="premium-title">Get Premium</div>
        <div class="price-tag">at ₹99</div>
        <div class="limited-offer">Limited Time Offer</div>

        <ul class="features">
            <li class="feature-item"><i class="fas fa-check-circle"></i> Unlock All Features</li>
            <li class="feature-item"><i class="fas fa-check-circle"></i> Ad-Free Experience</li>
            <li class="feature-item"><i class="fas fa-check-circle"></i> Priority Support</li>
        </ul>

        <button class="upgrade-btn" onclick="location.href='login.html'">Upgrade for ₹99</button>
    </div>

    <!-- Background Decoration -->
    <div class="confetti" style="left:10%; top:-10px; background:#FFD700;"></div>
    <div class="confetti" style="left:30%; top:-10px; background:#FF6B6B; animation-delay: 1s;"></div>
    <div class="confetti" style="left:50%; top:-10px; background:#4ECDC4; animation-delay: 2s;"></div>
    <div class="confetti" style="left:80%; top:-10px; background:#FFE66D; animation-delay: 0.5s;"></div>
</body>
</html>

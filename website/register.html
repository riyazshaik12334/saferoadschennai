<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Safe Roads Chennai</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <h1>Join the Community</h1>
        <p>Your contribution makes Chennai safer.</p>
    </div>

    <div class="premium-container animate-fade-in">
        <div class="card glass" style="max-width: 500px; margin: -40px auto 0;">
            <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary-blue);">Create Account</h2>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="regMobile" placeholder="Enter mobile number">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create a password">
            </div>

            <div style="margin-bottom: 2rem;">
                <label
                    style="display: flex; align-items: flex-start; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">
                    <input type="checkbox" style="margin-top: 4px; margin-right: 10px;">
                    <span>I agree to the <a href="#" style="color: var(--primary-blue);">Terms & Conditions</a> and <a
                            href="#" style="color: var(--primary-blue);">Privacy Policy</a> of Safe Roads
                        Chennai.</span>
                </label>
            </div>

            <button class="btn btn-primary" id="btnRegister" style="width: 100%;">Create Account</button>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="login.html"
                    style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Login Here</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const btnRegister = document.getElementById('btnRegister');
        btnRegister.addEventListener('click', async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const mobile = document.getElementById('regMobile').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !mobile || !password) {
                alert("Please fill all fields");
                return;
            }

            if (password.length < 8) {
                alert("Password must be at least 8 characters");
                return;
            }

            try {
                btnRegister.disabled = true;
                btnRegister.textContent = "Creating Account...";

                const result = await Api.post("register/", {
                    name, email, password, mobile
                });

                alert("Account created successfully! Please login.");
                window.location.href = "login.html";
            } catch (error) {
                alert(error.message);
                btnRegister.disabled = false;
                btnRegister.textContent = "Create Account";
            }
        });
    </script>
</body>

</html>
